<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeAI – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brown-dark  : #2d2215;
            --brown-mid   : #5a3e2b;
            --brown-accent: #d4845a;
            --brown-light : #f5d4c0;
            --bg          : #fff8f0;
            --surface     : #ffffff;
            --text-primary: #2a1f14;
            --text-muted  : #7a5540;
            --border      : #ecddd0;
            --radius      : 16px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image: url("{{ url_for('static', filename='images/bg-pattern.png') }}");
            background-size: cover;
            background-position: center;
        }

        .auth-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: 0 8px 40px rgba(90, 62, 43, 0.15);
            width: 100%;
            max-width: 440px;
            padding: 40px 36px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            justify-content: center;
        }

        .logo-icon { font-size: 2rem; }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--brown-accent);
            font-weight: 700;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--bg);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--brown-accent);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(90, 62, 43, 0.1);
        }

        /* Forms */
        .auth-form { display: none; flex-direction: column; gap: 16px; }
        .auth-form.active { display: flex; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--brown-mid);
        }

        input {
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text-primary);
            background: var(--bg);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--brown-accent); }

        /* Dietary preference row */
        .pref-row {
            display: flex;
            gap: 8px;
        }

        .pref-btn {
            flex: 1;
            padding: 9px 6px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .pref-btn.selected {
            border-color: var(--brown-accent);
            background: #fef5ec;
            color: var(--brown-accent);
            font-weight: 600;
        }

        /* Submit button */
        .submit-btn {
            margin-top: 4px;
            padding: 13px;
            background: var(--brown-accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:hover { background: #c4724a; }
        .submit-btn:active { transform: scale(0.98); }

        /* Flash messages */
        .flash {
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 500;
        }

        .flash.error   { background: #fde8e0; color: #9a2a10; border: 1px solid #f5c4a0; }
        .flash.success { background: #d8f5e6; color: #1e6b40; border: 1px solid #a8dfc0; }

        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="auth-card">

    <div class="logo">
        <span class="logo-icon">🥘</span>
        <span class="logo-text">RecipeAI</span>
    </div>

    <!-- Flash messages from Flask -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login', this)">Login</button>
        <button class="tab-btn" onclick="switchTab('register', this)">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form class="auth-form active" id="form-login" method="POST" action="/login">
        <input type="hidden" name="form_type" value="login" />

        <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" placeholder="you@email.com" required />
        </div>

        <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" placeholder="Your password" required />
        </div>

        <button type="submit" class="submit-btn">Login →</button>
    </form>

    <!-- REGISTER FORM -->
    <form class="auth-form" id="form-register" method="POST" action="/register">
        <input type="hidden" name="form_type" value="register" />

        <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" name="username" placeholder="e.g. foodlover42" required />
        </div>

        <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" name="email" placeholder="you@email.com" required />
        </div>

        <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" name="password" placeholder="Min 6 characters" required />
        </div>

        <div class="form-group">
            <label>Dietary Preference</label>
            <div class="pref-row">
                <button type="button" class="pref-btn selected" onclick="selectDiet(this, 'both')">🍽️ Both</button>
                <button type="button" class="pref-btn" onclick="selectDiet(this, 'veg')">🥦 Veg</button>
                <button type="button" class="pref-btn" onclick="selectDiet(this, 'non-veg')">🍗 Non-Veg</button>
            </div>
            <input type="hidden" name="dietary" id="dietary-input" value="both" />
        </div>

        <div class="form-group">
            <label for="reg-allergies">Allergies (optional)</label>
            <input type="text" id="reg-allergies" name="allergies" placeholder="e.g. nuts, dairy (comma separated)" />
        </div>

        <button type="submit" class="submit-btn">Create Account →</button>
    </form>

    <p class="footer-note">Smart • Simple • Tasty</p>
</div>

<script>
    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('form-' + tab).classList.add('active');
    }

    function selectDiet(btn, value) {
        document.querySelectorAll('.pref-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('dietary-input').value = value;
    }

    // Auto-switch to register tab if Flask redirects with ?tab=register
    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'register') {
        switchTab('register', document.querySelectorAll('.tab-btn')[1]);
    }
</script>

</body>
</html>
