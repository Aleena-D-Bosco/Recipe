# ============================================================
# MODULE 2: RECIPE RECOMMENDATION MODULE
# File: modules/recommendation_module.py
#
# Responsibility:
#   - Compare user's available ingredients with all recipes
#   - Calculate an ingredient match score (0–100%)
#   - Filter results by dietary preference
#   - Exclude recipes that contain allergic ingredients
#   - Optionally narrow down by dish name keyword
#   - Return results sorted by score (best match first)
#
# Dependencies:
#   - recipe_database_module  (provides RECIPE_DATABASE)
#   - substitute_module       (provides find_substitutes_for_missing)
# ============================================================

from modules.recipe_database_module import RECIPE_DATABASE
from modules.substitute_module import find_substitutes_for_missing


# ------------------------------------------------------------------
# HELPER: Normalize text for case-insensitive comparison
# ------------------------------------------------------------------

def normalize(text: str) -> str:
    """
    Strip whitespace and convert to lowercase.
    Used before all string comparisons so 'Garlic' == 'garlic'.
    """
    return text.strip().lower()


# ------------------------------------------------------------------
# HELPER: Calculate match score between user pantry and a recipe
# ------------------------------------------------------------------

def calculate_match_score(user_ingredients: list, recipe_ingredients: list) -> float:
    """
    Calculate what percentage of a recipe's ingredients the user already has.

    Formula:
        score = (matched ingredients / total recipe ingredients) × 100

    Args:
        user_ingredients   (list): Cleaned list of user's available ingredients.
        recipe_ingredients (list): Ingredients required by the recipe.

    Returns:
        float: Match score rounded to 1 decimal place (0.0 – 100.0).
    """
    if not recipe_ingredients:
        return 0.0

    user_set   = set(normalize(i) for i in user_ingredients)
    recipe_set = set(normalize(i) for i in recipe_ingredients)

    matched_count = len(user_set & recipe_set)          # intersection
    score = (matched_count / len(recipe_set)) * 100

    return round(score, 1)


# ------------------------------------------------------------------
# HELPER: Find which ingredients the user is missing
# ------------------------------------------------------------------

def get_missing_ingredients(user_ingredients: list, recipe_ingredients: list) -> list:
    """
    Return ingredients that the recipe needs but the user does not have.

    Args:
        user_ingredients   (list): User's available ingredients.
        recipe_ingredients (list): Recipe's required ingredients.

    Returns:
        list: Names of missing ingredients.
    """
    user_set   = set(normalize(i) for i in user_ingredients)
    recipe_set = set(normalize(i) for i in recipe_ingredients)
    return list(recipe_set - user_set)


# ------------------------------------------------------------------
# HELPER: Check if a recipe contains any allergic ingredient
# ------------------------------------------------------------------

def has_allergen(recipe_ingredients: list, allergy_list: list) -> bool:
    """
    Return True if ANY recipe ingredient matches ANY allergen the user listed.

    Args:
        recipe_ingredients (list): Ingredients in a specific recipe.
        allergy_list       (list): Normalized allergen strings from the user.

    Returns:
        bool: True if at least one allergen is found, False otherwise.
    """
    recipe_normalized = [normalize(i) for i in recipe_ingredients]

    for allergen in allergy_list:
        for ingredient in recipe_normalized:
            # Use substring matching: "dairy" will catch "dairy cream" etc.
            if allergen in ingredient:
                return True

    return False


# ------------------------------------------------------------------
# MAIN: Filter & rank recipes for the user
# ------------------------------------------------------------------

def filter_recipes(user_ingredients: list, dietary_preference: str,
                   allergies: list, dish_name: str = "") -> list:
    """
    Core recommendation engine — rule-based logic, no ML or external APIs.

    Steps:
        1. Skip recipes that don't match dietary preference.
        2. Skip recipes containing allergic ingredients.
        3. If dish_name given, keep only recipes matching that keyword.
        4. Calculate ingredient match score for each remaining recipe.
        5. Skip recipes where the user has zero matching ingredients
           (unless no ingredients were entered at all — browse mode).
        6. Attach missing ingredients and substitute suggestions.
        7. Return all qualifying recipes sorted by score (highest first).

    Args:
        user_ingredients   (list): Cleaned available ingredient list.
        dietary_preference (str) : "veg", "non-veg", or "both".
        allergies          (list): Allergen keywords to exclude.
        dish_name          (str) : Optional dish name keyword filter.

    Returns:
        list[dict]: Enriched recipe objects sorted by match score.
    """
    results       = []
    browse_mode   = len(user_ingredients) == 0   # No ingredients → show all
    allergy_clean = [normalize(a) for a in allergies]
    dish_keyword  = normalize(dish_name) if dish_name.strip() else ""

    for recipe_id, recipe in RECIPE_DATABASE.items():

        # ── Step 1: Dietary preference filter ────────────────────
        if dietary_preference == "veg" and recipe["category"] == "non-veg":
            continue   # User wants veg only; skip non-veg recipe

        # ── Step 2: Allergy filter ────────────────────────────────
        if has_allergen(recipe["ingredients"], allergy_clean):
            continue   # Recipe contains at least one allergen; skip it

        # ── Step 3: Dish name keyword filter (optional) ──────────
        if dish_keyword:
            name_match = dish_keyword in normalize(recipe["name"])
            tag_match  = any(dish_keyword in tag for tag in recipe.get("tags", []))
            if not name_match and not tag_match:
                continue  # Doesn't match the requested dish; skip

        # ── Step 4: Match score calculation ──────────────────────
        score = calculate_match_score(user_ingredients, recipe["ingredients"])

        # ── Step 5: Relevance threshold ──────────────────────────
        if not browse_mode and score == 0:
            continue  # No overlap at all; not helpful to the user

        # ── Step 6: Missing ingredients + substitutes ─────────────
        missing     = get_missing_ingredients(user_ingredients, recipe["ingredients"])
        substitutes = find_substitutes_for_missing(missing)

        # ── Build enriched result dictionary ──────────────────────
        results.append({
            "id"                 : recipe_id,
            "name"               : recipe["name"],
            "emoji"              : recipe["emoji"],
            "category"           : recipe["category"],
            "ingredients"        : recipe["ingredients"],
            "steps"              : recipe["steps"],
            "cooking_time"       : recipe["cooking_time"],
            "calories"           : recipe["calories"],
            "tags"               : recipe.get("tags", []),
            "score"              : score if not browse_mode else 100,
            "missing_ingredients": missing,
            "substitutes"        : substitutes
        })

    # ── Step 7: Sort by score (best match first) ──────────────────
    results.sort(key=lambda r: r["score"], reverse=True)

    return results